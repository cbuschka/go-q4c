on: [push, pull_request,workflow_dispatch]
name: build
jobs:
  test:
    strategy:
      matrix:
        go-version: [ 1.27.0-rc.1 ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test
      run: make test

    - name: Lint
      run: make lint
